<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>视频转 GIF 工具</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface2: #252836;
  --border: #2e3244;
  --text: #e4e4e7;
  --text2: #9394a1;
  --accent: #6c5ce7;
  --accent-hover: #7c6ef7;
  --green: #00c853;
  --red: #ff5252;
  --radius: 12px;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 2rem;
}

.container { max-width: 900px; margin: 0 auto; }

h1 {
  text-align: center;
  font-size: 1.8rem;
  margin-bottom: 0.3rem;
}

.subtitle {
  text-align: center;
  color: var(--text2);
  margin-bottom: 2rem;
  font-size: 0.9rem;
}

/* Upload area */
.upload-area {
  border: 2px dashed var(--border);
  border-radius: var(--radius);
  padding: 3rem 2rem;
  text-align: center;
  cursor: pointer;
  transition: border-color 0.2s, background 0.2s;
  background: var(--surface);
  margin-bottom: 1.5rem;
}

.upload-area:hover, .upload-area.dragover {
  border-color: var(--accent);
  background: var(--surface2);
}

.upload-area svg { margin-bottom: 0.8rem; }
.upload-area p { color: var(--text2); font-size: 0.95rem; }
.upload-area .formats { font-size: 0.8rem; color: var(--text2); margin-top: 0.5rem; opacity: 0.7; }

/* File list */
.file-list { display: flex; flex-direction: column; gap: 0.8rem; margin-bottom: 1.5rem; }

.file-item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1rem 1.2rem;
  display: flex;
  align-items: center;
  gap: 1rem;
}

.file-item .info { flex: 1; min-width: 0; }
.file-item .name { font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.file-item .meta { font-size: 0.8rem; color: var(--text2); margin-top: 0.2rem; }
.file-item .remove-btn {
  background: none; border: none; color: var(--text2); cursor: pointer;
  font-size: 1.2rem; padding: 0.3rem; line-height: 1; border-radius: 6px;
}
.file-item .remove-btn:hover { color: var(--red); background: rgba(255,82,82,0.1); }

/* Progress */
.file-item .progress-wrap { flex: 1; min-width: 0; }
.progress-bar {
  height: 6px;
  background: var(--surface2);
  border-radius: 3px;
  overflow: hidden;
  margin-top: 0.4rem;
}
.progress-bar .fill {
  height: 100%;
  background: var(--accent);
  border-radius: 3px;
  transition: width 0.3s;
  width: 0%;
}
.progress-bar .fill.done { background: var(--green); }
.progress-bar .fill.error { background: var(--red); }
.file-item .status-text { font-size: 0.8rem; color: var(--text2); margin-top: 0.3rem; }

/* Result actions */
.file-item .actions { display: flex; gap: 0.5rem; margin-top: 0.5rem; flex-wrap: wrap; }
.file-item .actions a, .file-item .actions button {
  font-size: 0.8rem; padding: 0.3rem 0.8rem; border-radius: 6px;
  text-decoration: none; cursor: pointer; border: 1px solid var(--border);
  background: var(--surface2); color: var(--text);
}
.file-item .actions a:hover, .file-item .actions button:hover {
  border-color: var(--accent); color: var(--accent);
}

/* GIF preview */
.gif-preview {
  max-width: 300px;
  max-height: 200px;
  border-radius: 8px;
  margin-top: 0.5rem;
}

/* Settings panel */
.settings {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.5rem;
  margin-bottom: 1.5rem;
}

.settings h2 { font-size: 1.1rem; margin-bottom: 1rem; }

.settings-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1rem 2rem;
}

.field label {
  display: block;
  font-size: 0.85rem;
  color: var(--text2);
  margin-bottom: 0.4rem;
}

.field .input-row {
  display: flex;
  align-items: center;
  gap: 0.8rem;
}

.field input[type="range"] {
  flex: 1;
  accent-color: var(--accent);
  height: 4px;
}

.field input[type="number"], .field select {
  width: 80px;
  padding: 0.4rem 0.5rem;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-size: 0.9rem;
  text-align: center;
}

.field select { width: auto; text-align: left; }

.field input[type="number"]:focus, .field select:focus {
  outline: none;
  border-color: var(--accent);
}

/* Buttons */
.btn-row {
  display: flex;
  gap: 0.8rem;
  margin-bottom: 1rem;
}

.btn {
  padding: 0.7rem 1.5rem;
  border: none;
  border-radius: var(--radius);
  font-size: 0.95rem;
  font-weight: 500;
  cursor: pointer;
  transition: background 0.2s, transform 0.1s;
}

.btn:active { transform: scale(0.98); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }

.btn-primary { background: var(--accent); color: #fff; flex: 1; }
.btn-primary:hover:not(:disabled) { background: var(--accent-hover); }

.btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
.btn-secondary:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }

.btn-danger { background: transparent; color: var(--red); border: 1px solid var(--red); }
.btn-danger:hover:not(:disabled) { background: rgba(255,82,82,0.1); }

@media (max-width: 600px) {
  body { padding: 1rem; }
  .settings-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div class="container">
  <h1>视频转 GIF</h1>
  <p class="subtitle">拖入视频，调整参数，一键生成 GIF</p>

  <!-- 上传区域 -->
  <div class="upload-area" id="uploadArea">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#6c5ce7" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
      <polyline points="17 8 12 3 7 8"/>
      <line x1="12" y1="3" x2="12" y2="15"/>
    </svg>
    <p>将视频文件拖拽到此处，或点击选择文件</p>
    <p class="formats">支持 MP4, AVI, MOV, MKV, WebM, FLV, WMV &mdash; 最多 10 个文件，单个不超过 500MB</p>
    <input type="file" id="fileInput" multiple accept=".mp4,.avi,.mov,.mkv,.webm,.flv,.wmv" hidden>
  </div>

  <!-- 文件列表 -->
  <div class="file-list" id="fileList"></div>

  <!-- 参数设置 -->
  <div class="settings" id="settingsPanel" style="display:none;">
    <h2>参数设置</h2>
    <div class="settings-grid">
      <div class="field">
        <label>帧率 (FPS) <span id="fpsVal">10</span></label>
        <div class="input-row">
          <input type="range" id="fps" min="1" max="30" value="10">
          <input type="number" id="fpsNum" min="1" max="30" value="10">
        </div>
      </div>
      <div class="field">
        <label>宽度 (像素)</label>
        <div class="input-row">
          <input type="range" id="width" min="100" max="1920" value="480" step="10">
          <input type="number" id="widthNum" min="100" max="1920" value="480" step="10">
        </div>
      </div>
      <div class="field">
        <label>起始时间 (秒)</label>
        <input type="number" id="start" min="0" step="0.1" value="0" style="width:100%">
      </div>
      <div class="field">
        <label>持续时长 (0 = 全部)</label>
        <input type="number" id="duration" min="0" step="0.1" value="0" style="width:100%">
      </div>
      <div class="field">
        <label>画质模式</label>
        <select id="quality">
          <option value="high">高质量（调色板，较慢）</option>
          <option value="fast">快速（单次处理）</option>
        </select>
      </div>
      <div class="field">
        <label>循环次数 (0 = 无限)</label>
        <input type="number" id="loop" min="0" value="0" style="width:100%">
      </div>
    </div>
  </div>

  <!-- 操作按钮 -->
  <div class="btn-row" id="actionRow" style="display:none;">
    <button class="btn btn-primary" id="convertBtn">开始转换</button>
    <button class="btn btn-secondary" id="clearBtn">清空列表</button>
  </div>

  <!-- 转换结果 -->
  <div class="file-list" id="resultList"></div>

  <div class="btn-row" style="justify-content:center; margin-top:1rem;">
    <button class="btn btn-danger" id="cleanBtn" style="display:none;">清理服务器文件</button>
  </div>
</div>

<script>
const $ = s => document.querySelector(s);
const uploadArea = $("#uploadArea");
const fileInput = $("#fileInput");
const fileList = $("#fileList");
const resultList = $("#resultList");
const settingsPanel = $("#settingsPanel");
const actionRow = $("#actionRow");
const convertBtn = $("#convertBtn");
const clearBtn = $("#clearBtn");
const cleanBtn = $("#cleanBtn");

let uploadedFiles = []; // {filename, original_name, size, duration}

// 拖拽上传
uploadArea.addEventListener("click", () => fileInput.click());
uploadArea.addEventListener("dragover", e => { e.preventDefault(); uploadArea.classList.add("dragover"); });
uploadArea.addEventListener("dragleave", () => uploadArea.classList.remove("dragover"));
uploadArea.addEventListener("drop", e => {
  e.preventDefault();
  uploadArea.classList.remove("dragover");
  handleFiles(e.dataTransfer.files);
});
fileInput.addEventListener("change", () => { handleFiles(fileInput.files); fileInput.value = ""; });

// 滑块同步
function syncSlider(sliderId, numId, valId) {
  const slider = $(`#${sliderId}`);
  const num = $(`#${numId}`);
  const val = valId ? $(`#${valId}`) : null;
  slider.addEventListener("input", () => { num.value = slider.value; if (val) val.textContent = slider.value; });
  num.addEventListener("input", () => { slider.value = num.value; if (val) val.textContent = num.value; });
}
syncSlider("fps", "fpsNum", "fpsVal");
syncSlider("width", "widthNum", null);

function formatSize(bytes) {
  if (bytes < 1024) return bytes + " B";
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + " KB";
  return (bytes / (1024 * 1024)).toFixed(1) + " MB";
}

function formatDuration(sec) {
  if (!sec) return "未知";
  const m = Math.floor(sec / 60);
  const s = (sec % 60).toFixed(1);
  return m > 0 ? `${m}分${s}秒` : `${s}秒`;
}

const UPLOAD_AREA_HTML = `
  <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#6c5ce7" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
    <polyline points="17 8 12 3 7 8"/>
    <line x1="12" y1="3" x2="12" y2="15"/>
  </svg>
  <p>将视频文件拖拽到此处，或点击选择文件</p>
  <p class="formats">支持 MP4, AVI, MOV, MKV, WebM, FLV, WMV &mdash; 最多 10 个文件，单个不超过 500MB</p>`;

async function handleFiles(filesList) {
  const files = Array.from(filesList);
  if (uploadedFiles.length + files.length > 10) {
    alert("最多允许上传 10 个文件");
    return;
  }

  const form = new FormData();
  files.forEach(f => form.append("files", f));

  uploadArea.innerHTML = '<p style="color:var(--accent)">正在上传...</p>';

  try {
    const resp = await fetch("/upload", { method: "POST", body: form });
    const data = await resp.json();
    if (!resp.ok) { alert(data.error || "上传失败"); return; }

    uploadedFiles.push(...data.files);
    renderFileList();
  } catch (e) {
    alert("上传失败: " + e.message);
  } finally {
    uploadArea.innerHTML = UPLOAD_AREA_HTML;
  }
}

function renderFileList() {
  fileList.innerHTML = "";
  uploadedFiles.forEach((f, i) => {
    const div = document.createElement("div");
    div.className = "file-item";
    div.innerHTML = `
      <div class="info">
        <div class="name">${f.original_name}</div>
        <div class="meta">${formatSize(f.size)} &middot; ${formatDuration(f.duration)}</div>
      </div>
      <button class="remove-btn" data-idx="${i}">&times;</button>`;
    fileList.appendChild(div);
  });

  fileList.querySelectorAll(".remove-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      uploadedFiles.splice(parseInt(btn.dataset.idx), 1);
      renderFileList();
    });
  });

  settingsPanel.style.display = uploadedFiles.length ? "" : "none";
  actionRow.style.display = uploadedFiles.length ? "" : "none";
}

// 开始转换
convertBtn.addEventListener("click", async () => {
  if (!uploadedFiles.length) return;

  const params = {
    files: uploadedFiles.map(f => f.filename),
    fps: parseInt($("#fps").value),
    width: parseInt($("#width").value),
    start: parseFloat($("#start").value) || 0,
    duration: parseFloat($("#duration").value) || 0,
    quality: $("#quality").value,
    loop: parseInt($("#loop").value) || 0,
  };

  convertBtn.disabled = true;
  convertBtn.textContent = "转换中...";
  resultList.innerHTML = "";
  cleanBtn.style.display = "none";

  try {
    const resp = await fetch("/convert", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(params),
    });
    const data = await resp.json();
    if (!resp.ok) { alert(data.error || "转换请求失败"); return; }

    data.tasks.forEach(t => {
      const div = document.createElement("div");
      div.className = "file-item";
      div.id = `task-${t.task_id}`;

      const file = uploadedFiles.find(f => f.filename === t.filename);
      const name = file ? file.original_name : t.filename;

      div.innerHTML = `
        <div class="progress-wrap">
          <div class="name">${name}</div>
          <div class="progress-bar"><div class="fill" id="fill-${t.task_id}"></div></div>
          <div class="status-text" id="status-${t.task_id}">排队中...</div>
          <div class="actions" id="actions-${t.task_id}"></div>
        </div>`;
      resultList.appendChild(div);

      trackTask(t.task_id);
    });

  } catch (e) {
    alert("出错了: " + e.message);
  }
});

function trackTask(taskId) {
  const es = new EventSource(`/status/${taskId}`);
  let retries = 0;

  es.onmessage = (event) => {
    const d = JSON.parse(event.data);
    const fill = $(`#fill-${taskId}`);
    const status = $(`#status-${taskId}`);
    const actions = $(`#actions-${taskId}`);

    if (d.error && !d.status) {
      status.textContent = d.error;
      es.close();
      return;
    }

    fill.style.width = d.progress + "%";
    status.textContent = d.stage || d.status || "";

    if (d.status === "done") {
      fill.classList.add("done");
      status.textContent = `已完成 - ${formatSize(d.file_size)}`;
      actions.innerHTML = `
        <a href="/download/${d.output}" download>下载</a>
        <button onclick="togglePreview('${taskId}','${d.output}')">预览</button>`;
      es.close();
      checkAllDone();
    } else if (d.status === "error") {
      fill.classList.add("error");
      fill.style.width = "100%";
      status.textContent = "失败: " + (d.error || "未知错误");
      es.close();
      checkAllDone();
    }
  };

  es.onerror = () => {
    retries++;
    if (retries > 5) {
      es.close();
      const status = $(`#status-${taskId}`);
      if (status) status.textContent = "连接已断开";
      checkAllDone();
    }
  };
}

function togglePreview(taskId, output) {
  const actions = $(`#actions-${taskId}`);
  const existing = actions.querySelector(".gif-preview");
  if (existing) { existing.remove(); return; }
  const img = document.createElement("img");
  img.className = "gif-preview";
  img.src = `/preview/${output}`;
  actions.appendChild(img);
}

function checkAllDone() {
  const fills = resultList.querySelectorAll(".fill");
  const done = resultList.querySelectorAll(".fill.done, .fill.error");
  if (fills.length > 0 && fills.length === done.length) {
    convertBtn.disabled = false;
    convertBtn.textContent = "开始转换";
    cleanBtn.style.display = "";
  }
}

// 清空列表
clearBtn.addEventListener("click", () => {
  uploadedFiles = [];
  fileList.innerHTML = "";
  resultList.innerHTML = "";
  settingsPanel.style.display = "none";
  actionRow.style.display = "none";
  cleanBtn.style.display = "none";
});

// 清理服务器文件
cleanBtn.addEventListener("click", async () => {
  if (!confirm("确定要删除服务器上所有已上传的视频和生成的 GIF 文件吗？")) return;
  await fetch("/clean", { method: "DELETE" });
  cleanBtn.style.display = "none";
  resultList.innerHTML = "";
});
</script>
</body>
</html>
